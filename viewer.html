<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espectador</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .calibrating-text {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.9;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 0.4; }
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.2);
                opacity: 0.7;
            }
        }

        .status-text {
            font-size: 16px;
            font-weight: 400;
        }

        .music-info {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            margin-top: 30px;
        }

        .music-info.active {
            opacity: 1;
            transform: translateY(0);
        }

        .music-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .music-subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .map-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
        
        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            border-radius: 10px;
        }
        
        .control-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
        }

        
        .connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
        }

        .connection-status.connected {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .connection-status.disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid rgba(244, 67, 54, 0.5);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .device-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="connection-status" id="connectionStatus">Conectando...</div>
    
    <div class="container">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span class="status-text">Esperando señal</span>
        </div>
        
        <div class="calibrating-text" id="calibratingText">
            Calibrando sensores... Mantenga el dispositivo boca abajo
        </div>
        
        <div class="music-info" id="musicInfo">
            <div class="music-title" id="musicTitle">Canción detectada</div>
            <div class="music-subtitle" id="musicSubtitle">Voltea el celular para reproducir</div>
        </div>
        
        <div class="map-container" id="mapContainer" style="display: none;">
            <div class="map-wrapper">
                <iframe 
                    id="googleMaps"
                    width="560" 
                    height="315" 
                    src="" 
                    frameborder="0" 
                    allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>
    
    <div class="device-hint">
        📱 Mantén el dispositivo en posición vertical para mejor experiencia
    </div>

    <script>
        // Get DOM elements
        const connectionStatus = document.getElementById('connectionStatus');
        const calibratingText = document.getElementById('calibratingText');
        const musicInfo = document.getElementById('musicInfo');
        const musicTitle = document.getElementById('musicTitle');
        const musicSubtitle = document.getElementById('musicSubtitle');
        const particles = document.getElementById('particles');
        const mapContainer = document.getElementById('mapContainer');
        const googleMaps = document.getElementById('googleMaps');
        let clientId = 'viewer-' + Date.now();
        let lastEventId = 0;
        
        // HTTP polling function
        async function pollMusicEvents() {
            try {
                const response = await fetch(`/api/music-events?clientId=${clientId}&t=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Check for new events
                const newEvents = data.events.filter(event => event.id > lastEventId);
                
                if (newEvents.length > 0) {
                    const latestEvent = newEvents[newEvents.length - 1];
                    lastEventId = latestEvent.id;
                    handleMusicEvent(latestEvent);
                }
                
                // Update connection status
                connectionStatus.textContent = `Conectado (${data.connectedClients || 1})`;
                connectionStatus.className = 'connection-status connected';
                
            } catch (error) {
                connectionStatus.textContent = 'Reconectando...';
                connectionStatus.className = 'connection-status disconnected';
            }
        }
        
        // Handle location event
        function handleLocationEvent(data) {
            const locationQuery = data.query || data;
            
            // Update UI
            musicTitle.textContent = locationQuery;
            musicSubtitle.textContent = 'Ubicación encontrada';
            
            // Show location info
            musicInfo.classList.add('active');
            calibratingText.style.opacity = '0.3';
            
            // Load Google Maps
            window.currentLocation = locationQuery;
            loadGoogleMaps(locationQuery);
        }
        
        // Create floating particles
        function createParticles() {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particles.appendChild(particle);
            }
        }
        
        createParticles();
        
        // YouTube API initialization
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtubePlayer', {
                height: '315',
                width: '560',
                videoId: '',
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }
        
        function onPlayerReady(event) {
            player.setVolume(50);
        }
        
        function onPlayerError(event) {
            musicSubtitle.textContent = 'Error al cargar video. Intenta otra canción.';
        }
        
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isVideoPlaying = true;
            } else {
                isVideoPlaying = false;
            }
        }
        
        function loadGoogleMaps(locationQuery) {
            // Clean the query - remove dots and special characters
            const cleanQuery = locationQuery.replace(/^\.+/, '').trim();
            
            // Get location coordinates
            const locationData = getLocationFromSearch(cleanQuery);
            
            if (locationData && googleMaps) {
                try {
                    // Create Google Maps URL
                    const mapsUrl = `https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTQTdLFWF3J8Fe8r_3BT9QDQ&q=${encodeURIComponent(locationData.address)}`;
                    
                    // Load maps
                    googleMaps.src = mapsUrl;
                    mapContainer.style.display = 'flex';
                    musicSubtitle.textContent = 'Mapa cargado - Abriendo aplicación...';
                    
                    // Auto-open Google Maps app after 2 seconds
                    setTimeout(() => {
                        openGoogleMapsApp(locationData);
                    }, 2000);
                    
                } catch (error) {
                    musicSubtitle.textContent = 'Error al cargar mapa';
                }
            } else {
                musicSubtitle.textContent = 'Ubicación no encontrada';
            }
        }
        
        // Fallback video loading function
        function loadFallbackVideo(videoId) {
            const fallbackPlayer = document.getElementById('fallbackPlayer');
            const videoElement = document.getElementById('videoElement');
            const youtubePlayer = document.getElementById('youtubePlayer');
            
            if (fallbackPlayer && videoElement) {
                // Hide YouTube player, show fallback
                youtubePlayer.style.display = 'none';
                fallbackPlayer.style.display = 'block';
                videoContainer.style.display = 'flex';
                
                // Create iframe for YouTube embed (more reliable than video element)
                const iframe = document.createElement('iframe');
                iframe.width = '560';
                iframe.height = '315';
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1&rel=0`;
                iframe.frameBorder = '0';
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                iframe.allowFullscreen = true;
                iframe.style.width = '100%';
                iframe.style.maxWidth = '560px';
                
                // Clear and set new iframe
                videoElement.innerHTML = '';
                videoElement.appendChild(iframe);
                
                musicSubtitle.textContent = 'Video cargado (modo alternativo)';
            } else {
                musicSubtitle.textContent = 'Error: No se pudo cargar ningún reproductor';
            }
        }
        
        // Simple function to get location data from search
        function getLocationFromSearch(query) {
            // Popular locations database
            const locationMap = {
                'torre eiffel': { address: 'Tour Eiffel, Paris, France', lat: 48.8584, lng: 2.2945 },
                'estatua libertad': { address: 'Statue of Liberty, New York, USA', lat: 40.6892, lng: -74.0445 },
                'times square': { address: 'Times Square, New York, USA', lat: 40.7580, lng: -73.9855 },
                'coliseo': { address: 'Colosseum, Rome, Italy', lat: 41.8902, lng: 12.4922 },
                'muro berlin': { address: 'Berlin Wall, Berlin, Germany', lat: 52.5163, lng: 13.3777 },
                'taj mahal': { address: 'Taj Mahal, Agra, India', lat: 27.1751, lng: 78.0421 },
                'machu picchu': { address: 'Machu Picchu, Peru', lat: -13.1631, lng: -72.5450 },
                'piramides': { address: 'Great Pyramids of Giza, Egypt', lat: 29.9792, lng: 31.1342 },
                'sydney opera': { address: 'Sydney Opera House, Sydney, Australia', lat: -33.8568, lng: 151.2153 },
                'golden gate': { address: 'Golden Gate Bridge, San Francisco, USA', lat: 37.8199, lng: -122.4783 },
                'disney': { address: 'Disneyland, Anaheim, USA', lat: 33.8121, lng: -117.9180 },
                'white house': { address: 'White House, Washington DC, USA', lat: 38.8977, lng: -77.0365 },
                'burj khalifa': { address: 'Burj Khalifa, Dubai, UAE', lat: 25.1972, lng: 55.2744 },
                'central park': { address: 'Central Park, New York, USA', lat: 40.7829, lng: -73.9654 },
                'hollywood': { address: 'Hollywood Sign, Los Angeles, USA', lat: 34.1341, lng: -118.3215 }
            };
            
            // Check if query matches any known locations
            const lowerQuery = query.toLowerCase();
            for (const [key, locationData] of Object.entries(locationMap)) {
                if (lowerQuery.includes(key)) {
                    return locationData;
                }
            }
            
            // Default fallback - search the query directly
            return { address: query, lat: null, lng: null };
        }
        
                
        // Open Google Maps app on mobile
        function openGoogleMapsApp(locationData) {
            const mapsUrl = locationData.lat && locationData.lng 
                ? `geo:${locationData.lat},${locationData.lng}?q=${encodeURIComponent(locationData.address)}`
                : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(locationData.address)}`;
            
            // Try to open in Google Maps app
            window.location.href = mapsUrl;
            
            musicSubtitle.textContent = '¡Abriendo Google Maps!';
        }
        
        // Test API connectivity
        async function testAPI() {
            try {
                const response = await fetch('/api/status?t=' + Date.now());
                const data = await response.json();
                connectionStatus.textContent = `API OK (${data.connectedClients} clients)`;
                connectionStatus.className = 'connection-status connected';
            } catch (error) {
                connectionStatus.textContent = 'API Error';
                connectionStatus.className = 'connection-status disconnected';
            }
        }
        
        // Start polling for location events immediately
        testAPI();
        setInterval(pollMusicEvents, 2000);

        // Handle location events
        pollMusicEvents = async function() {
            try {
                const response = await fetch(`/api/music-events?clientId=${clientId}&t=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Check for new events
                const newEvents = data.events.filter(event => event.id > lastEventId);
                
                if (newEvents.length > 0) {
                    const latestEvent = newEvents[newEvents.length - 1];
                    lastEventId = latestEvent.id;
                    handleLocationEvent(latestEvent);
                }
                
                // Update connection status
                connectionStatus.textContent = `Conectado (${data.connectedClients || 1})`;
                connectionStatus.className = 'connection-status connected';
                
            } catch (error) {
                connectionStatus.textContent = 'Reconectando...';
                connectionStatus.className = 'connection-status disconnected';
            }
        };

                
            </script>
</body>
</html>
