<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espectador</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .calibrating-text {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.9;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 0.4; }
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.2);
                opacity: 0.7;
            }
        }

        .status-text {
            font-size: 16px;
            font-weight: 400;
        }

        .music-info {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            margin-top: 30px;
        }

        .music-info.active {
            opacity: 1;
            transform: translateY(0);
        }

        .music-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .music-subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .video-wrapper {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16/9;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .video-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
        }

        
        .connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
        }

        .connection-status.connected {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .connection-status.disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid rgba(244, 67, 54, 0.5);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .device-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="connection-status" id="connectionStatus">Conectando...</div>
    
    <div class="container">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span class="status-text">Esperando señal</span>
        </div>
        
        <div class="calibrating-text" id="calibratingText">
            Calibrando sensores... Mantenga el dispositivo boca abajo
        </div>
        
        <div class="music-info" id="musicInfo">
            <div class="music-title" id="musicTitle">Canción detectada</div>
            <div class="music-subtitle" id="musicSubtitle">Voltea el celular para reproducir</div>
        </div>
        
        <div class="video-container" id="videoContainer" style="display: none;">
            <div class="video-wrapper">
                <iframe 
                    id="youtubePlayer"
                    width="560" 
                    height="315" 
                    src="" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
                
                <!-- Fallback video player -->
                <div id="fallbackPlayer" style="display: none;">
                    <video 
                        id="videoElement"
                        width="560" 
                        height="315" 
                        controls
                        style="width: 100%; max-width: 560px;">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </div>
    </div>
    
    <div class="device-hint">
        📱 Mantén el dispositivo en posición vertical para mejor experiencia
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Get DOM elements
        const connectionStatus = document.getElementById('connectionStatus');
        const calibratingText = document.getElementById('calibratingText');
        const musicInfo = document.getElementById('musicInfo');
        const musicTitle = document.getElementById('musicTitle');
        const musicSubtitle = document.getElementById('musicSubtitle');
        const particles = document.getElementById('particles');
        const videoContainer = document.getElementById('videoContainer');
        const youtubePlayer = document.getElementById('youtubePlayer');
        let player = null;
        let isVideoPlaying = false;
        let clientId = 'viewer-' + Date.now();
        let lastEventId = 0;
        
        // HTTP polling function
        async function pollMusicEvents() {
            try {
                const response = await fetch(`/api/music-events?clientId=${clientId}&t=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Check for new events
                const newEvents = data.events.filter(event => event.id > lastEventId);
                
                if (newEvents.length > 0) {
                    const latestEvent = newEvents[newEvents.length - 1];
                    lastEventId = latestEvent.id;
                    handleMusicEvent(latestEvent);
                }
                
                // Update connection status
                connectionStatus.textContent = `Conectado (${data.connectedClients || 1})`;
                connectionStatus.className = 'connection-status connected';
                
            } catch (error) {
                connectionStatus.textContent = 'Reconectando...';
                connectionStatus.className = 'connection-status disconnected';
            }
        }
        
        // Handle music event
        function handleMusicEvent(data) {
            const songQuery = data.query || data;
            
            // Update UI
            musicTitle.textContent = songQuery;
            musicSubtitle.textContent = 'Voltea el celular para reproducir';
            
            // Show music info
            musicInfo.classList.add('active');
            calibratingText.style.opacity = '0.3';
            
            // Load YouTube video (but don't play yet)
            window.currentSongQuery = songQuery;
            loadYouTubeVideo(songQuery);
        }
        
        // Create floating particles
        function createParticles() {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particles.appendChild(particle);
            }
        }
        
        createParticles();
        
        // YouTube API initialization
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtubePlayer', {
                height: '315',
                width: '560',
                videoId: '',
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }
        
        function onPlayerReady(event) {
            player.setVolume(50);
        }
        
        function onPlayerError(event) {
            musicSubtitle.textContent = 'Error al cargar video. Intenta otra canción.';
        }
        
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isVideoPlaying = true;
            } else {
                isVideoPlaying = false;
            }
        }
        
        function loadYouTubeVideo(songQuery) {
            // Clean the query - remove dots and special characters
            const cleanQuery = songQuery.replace(/^\.+/, '').trim();
            
            // Get video ID
            const videoId = getVideoIdFromSearch(cleanQuery);
            
            // Wait for player to be ready, then load video
            let loadAttempts = 0;
            const maxLoadAttempts = 10; // 5 seconds max wait
            
            function attemptLoad() {
                loadAttempts++;
                
                if (player && player.loadVideoById) {
                    try {
                        // Load video by ID
                        player.loadVideoById(videoId);
                        videoContainer.style.display = 'flex';
                        musicSubtitle.textContent = '¡Video cargado! Click para reproducir';
                        
                        // Auto-play after 1 second
                        setTimeout(() => {
                            if (player && player.playVideo) {
                                player.playVideo();
                                musicSubtitle.textContent = '¡Reproduciendo música!';
                            }
                        }, 1000);
                    } catch (error) {
                        musicSubtitle.textContent = 'Error al cargar video';
                    }
                } else if (loadAttempts < maxLoadAttempts) {
                    // Player not ready, retry after 500ms
                    musicSubtitle.textContent = `Preparando reproductor... (${loadAttempts}/${maxLoadAttempts})`;
                    setTimeout(attemptLoad, 500);
                } else {
                    // Failed to load YouTube player - use fallback
                    loadFallbackVideo(videoId);
                }
            }
            
            attemptLoad();
        }
        
        // Fallback video loading function
        function loadFallbackVideo(videoId) {
            const fallbackPlayer = document.getElementById('fallbackPlayer');
            const videoElement = document.getElementById('videoElement');
            const youtubePlayer = document.getElementById('youtubePlayer');
            
            if (fallbackPlayer && videoElement) {
                // Hide YouTube player, show fallback
                youtubePlayer.style.display = 'none';
                fallbackPlayer.style.display = 'block';
                videoContainer.style.display = 'flex';
                
                // Load video using direct YouTube embed URL
                videoElement.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1`;
                musicSubtitle.textContent = 'Video cargado (modo alternativo)';
                
                // Auto-play fallback
                videoElement.play().catch(e => {
                    musicSubtitle.textContent = 'Video cargado - Click para reproducir';
                });
            } else {
                musicSubtitle.textContent = 'Error: No se pudo cargar ningún reproductor';
            }
        }
        
        // Simple function to get video ID from search (using common patterns)
        function getVideoIdFromSearch(query) {
            // For common songs, return known video IDs
            const videoMap = {
                'bad bunny': '4tWOOI3C4sQ',
                'alok': '2QvI9iBdLbA',
                'unforgetable': '2QvI9iBdLbA',
                'shakira': 'gl1aDHhNkKs',
                'daddy yankee': 'CfihYWRWRTQ',
                'rosalia': 'tQ35Wk_dcuE',
                'bizarrap': 'kTJczUocfmU'
            };
            
            // Check if query matches any known songs
            const lowerQuery = query.toLowerCase();
            for (const [key, videoId] of Object.entries(videoMap)) {
                if (lowerQuery.includes(key)) {
                    return videoId;
                }
            }
            
            // Default fallback video
            return 'dQw4w9WgXcQ';
        }
        
                
        // Test API connectivity
        async function testAPI() {
            try {
                const response = await fetch('/api/status?t=' + Date.now());
                const data = await response.json();
                connectionStatus.textContent = `API OK (${data.connectedClients} clients)`;
                connectionStatus.className = 'connection-status connected';
            } catch (error) {
                connectionStatus.textContent = 'API Error';
                connectionStatus.className = 'connection-status disconnected';
            }
        }
        
        // Wait for YouTube API to be ready before starting polling
        let apiAttempts = 0;
        const maxApiAttempts = 20; // 10 seconds max wait
        
        function waitForYouTubeAPI() {
            apiAttempts++;
            
            if (typeof YT !== 'undefined' && YT.Player) {
                testAPI();
                // Start polling for music events
                setInterval(pollMusicEvents, 2000);
            } else if (apiAttempts < maxApiAttempts) {
                setTimeout(waitForYouTubeAPI, 500);
            } else {
                // YouTube API failed to load - show error
                musicSubtitle.textContent = 'Error: YouTube API no disponible';
                connectionStatus.textContent = 'API Error';
                connectionStatus.className = 'connection-status disconnected';
                
                // Start polling anyway for music events
                setInterval(pollMusicEvents, 2000);
            }
        }
        
        // Start the initialization process
        waitForYouTubeAPI();

        // Simplified video control - auto-play with click toggle
        window.addEventListener('click', () => {
            if (window.currentSongQuery && player) {
                if (isVideoPlaying) {
                    player.pauseVideo();
                    musicSubtitle.textContent = 'Pausado - Click para continuar';
                } else {
                    player.playVideo();
                    musicSubtitle.textContent = '¡Reproduciendo música!';
                }
            }
        });

                
            </script>
</body>
</html>
