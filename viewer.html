<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        #mapFrame {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            border: 0;
            background: #e5e3df;
        }
    </style>
</head>
<body>
    <iframe id="mapFrame" allowfullscreen loading="lazy"></iframe>

    <script>
        const mapFrame = document.getElementById('mapFrame');

        const clientId = 'viewer-' + Date.now();
        const sessionStartMs = Date.now();
        const VIEWER_RESET_MS = 20000;

        let lastEventId = 0;
        let resetTimer = null;
        let currentAddress = '';
        const DEFAULT_MAP_URL = 'https://www.google.com/maps?q=world&output=embed';

        function showMap(url) {
            mapFrame.src = url;
        }

        function resetViewer() {
            mapFrame.src = DEFAULT_MAP_URL;
            currentAddress = '';
        }

        function getLocationAddress(query) {
            const cleanQuery = String(query || '').replace(/^\.+/, '').trim();

            const locationMap = {
                'torre eiffel': 'Tour Eiffel, Paris, France',
                'estatua libertad': 'Statue of Liberty, New York, USA',
                'times square': 'Times Square, New York, USA',
                'coliseo': 'Colosseum, Rome, Italy',
                'muro berlin': 'Berlin Wall, Berlin, Germany',
                'taj mahal': 'Taj Mahal, Agra, India',
                'machu picchu': 'Machu Picchu, Peru',
                'piramides': 'Great Pyramids of Giza, Egypt',
                'sydney opera': 'Sydney Opera House, Sydney, Australia',
                'golden gate': 'Golden Gate Bridge, San Francisco, USA',
                'disney': 'Disneyland, Anaheim, USA',
                'white house': 'White House, Washington DC, USA',
                'burj khalifa': 'Burj Khalifa, Dubai, UAE',
                'central park': 'Central Park, New York, USA',
                'hollywood': 'Hollywood Sign, Los Angeles, USA'
            };

            const lower = cleanQuery.toLowerCase();
            for (const [key, value] of Object.entries(locationMap)) {
                if (lower.includes(key)) {
                    return value;
                }
            }

            return cleanQuery;
        }

        function handleLocationEvent(eventData) {
            const locationQuery = eventData.query || '';
            const address = getLocationAddress(locationQuery);
            const mapsUrl = `https://www.google.com/maps?q=${encodeURIComponent(address)}&output=embed`;
            currentAddress = address;

            showMap(mapsUrl);
            setTimeout(() => {
                const openUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
                window.location.href = openUrl;
            }, 900);

            if (resetTimer) {
                clearTimeout(resetTimer);
            }
            resetTimer = setTimeout(resetViewer, VIEWER_RESET_MS);
        }

        async function pollEvents() {
            try {
                const response = await fetch(`/api/music-events?clientId=${clientId}&since=${sessionStartMs}&t=${Date.now()}`);

                if (response.status === 409) {
                    return;
                }

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const newEvents = (data.events || []).filter((event) => event.id > lastEventId);

                if (newEvents.length > 0) {
                    const latest = newEvents[newEvents.length - 1];
                    lastEventId = latest.id;
                    handleLocationEvent(latest);
                }
            } catch (_error) {}
        }

        showMap(DEFAULT_MAP_URL);
        pollEvents();
        setInterval(pollEvents, 1000);

        // Gesto discreto: tocar el mapa para intentar abrir Google Maps
        mapFrame.addEventListener('click', () => {
            if (!currentAddress) {
                return;
            }

            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentAddress)}`;
            window.location.replace(mapsUrl);
        });
    </script>
</body>
</html>
